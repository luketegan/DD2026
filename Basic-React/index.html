<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <!-- Link to the react library from unpkg.com -->
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <!-- Link to the Babel library from unpkg.com -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!--Import bootstrap from https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
  </head>
  <body>
    <!-- Important React concepts: Components, Props, State -->
    <!-- https://www.cdn.miami.edu/_assets-common/php/searchblox/? -->
    <div id="app" class="container"></div>
    <script type="text/babel">
      const app = document.getElementById("app");

      function Header({ title }) {
        return <h1> {createTitle(title)} </h1>;
      }

      function Paragraph(props) {
        return <p>{props.text}</p>;
      }

      function createTitle(title) {
        if (title) {
          return title;
        } else {
          return "Default title";
        }
      }

      function formatHtml(text) {
        //Formats html from a json api object
        return text;
      }

      function Results({
        result,
        currentPage,
        totalPages,
        totalResults,
        onNextPage,
        onPreviousPage
      }) {
        return (
          <div>
            {result.length > 0 && <h2>Search Results:</h2>}
            {result.length > 0 && (
              <>
                <Paragraph text={`Showing page ${currentPage} of ${totalPages}`} />
                <Paragraph text={`Total Results: ${totalResults}`} />
              </>
            )}

           <table class="table table-striped">
              <tbody>
               {result.map((res, index) => (
                <tr key={res.uid}>
                  <td>
                  <strong>{res.alpha} </strong> <br />
                  {res.context} <br />
                  <a href={res.url} target="_blank">
                    View
                  </a>
                </td>
                </tr>
              ))}
              </tbody>
            </table>
            {result.length > 0 && (
              <>
                <button
                  className="btn btn-secondary me-2"
                  onClick={onPreviousPage}
                  disabled={currentPage === 1}
                >
                  Previous Page
                </button>

                <button
                  className="btn btn-secondary"
                  onClick={onNextPage}
                  disabled={currentPage === totalPages}
                >
                  Next Page
                </button>
              </>
            )}
          </div>
        );
      }

      function Homepage() {

        const [searchTerm, setSearchTerm] = React.useState("");
        const [searchResults, setSearchResults] = React.useState([]);

        const [currentPage, setCurrentPage] = React.useState(1);
        const [totalPages, setTotalPages] = React.useState(0);
        const [totalResults, setTotalResults] = React.useState(0);

        function performSearch() {
          const searchUrl = `https://www.cdn.miami.edu/_assets-common/php/searchblox/?q=${searchTerm}`;
          
          fetch(searchUrl)
            .then((response) => response.json())
            .then((data) => {
              console.log("Search results: ", data);
              setSearchResults(data.result);
              setTotalResults(data.hits);
              setCurrentPage(data.currentPage);
              setTotalPages(data.lastPage);
            })
            .catch((error) => {
              console.error("Error performing search: ", error);
            });
          }
          
        function handleSearch() {
          setCurrentPage(1);
          performSearch(1);
        }

        function handleNextPage() {
          performSearch(currentPage + 1);
        }

        function handlePreviousPage() {
          performSearch(currentPage - 1);
        }
        return (
          <>
            <Header title="Welcome to the Search Page" />
            <Paragraph text="Enter a term below to search."/>
            <div class="mb-3">
            <label className="form-label" htmlFor="search">
              Search: 
            </label>
            <input
              type="text"
              id="search"
              name="search"
              placeholder="Search miami.edu..."
              value={searchTerm}
              onChange={(e) => setSearchTerm(e.target.value)}
            />
          </div>

            <button className="btn btn-primary mb-3" onClick={handleSearch}>
              Search
            </button>

            <Results
              result={searchResults}
              currentPage={currentPage}
              totalPages={totalPages}
              totalResults={totalResults}
              onNextPage={handleNextPage}
              onPreviousPage={handlePreviousPage}
            />
          </>
        );
      }
        
      const root = ReactDOM.createRoot(app);
      root.render(<Homepage />);
    </script>
  </body>
</html>
